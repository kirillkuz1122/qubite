<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfaf7"/>
      <stop offset="100%" stop-color="#eef7f4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="12" flood-color="#102030" flood-opacity="0.13"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="70" y="76" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#102030">Роли вокруг турнира</text>
  <text x="70" y="113" font-family="Inter, Arial, sans-serif" font-size="20" fill="#53616b">Платформа должна работать не только для ученика, но и для организатора события.</text>

  <g filter="url(#shadow)">
    <circle cx="600" cy="347" r="118" fill="#173b46"/>
    <circle cx="600" cy="347" r="82" fill="#4fb286"/>
  </g>
  <text x="600" y="337" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="800" fill="#ffffff">Турнир</text>
  <text x="600" y="374" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#e8fff4">главный объект системы</text>

  <g filter="url(#shadow)" font-family="Inter, Arial, sans-serif">
    <rect x="105" y="185" width="260" height="92" rx="20" fill="#ffffff" stroke="#d8e2da"/>
    <rect x="835" y="185" width="260" height="92" rx="20" fill="#ffffff" stroke="#d8e2da"/>
    <rect x="105" y="420" width="260" height="92" rx="20" fill="#ffffff" stroke="#d8e2da"/>
    <rect x="835" y="420" width="260" height="92" rx="20" fill="#ffffff" stroke="#d8e2da"/>
    <rect x="470" y="525" width="260" height="92" rx="20" fill="#ffffff" stroke="#d8e2da"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="235" y="223" text-anchor="middle" font-size="24" font-weight="800" fill="#173b46">user</text>
    <text x="235" y="253" text-anchor="middle" font-size="16" fill="#53616b">участие, задачи, рейтинг</text>
    <text x="965" y="223" text-anchor="middle" font-size="24" font-weight="800" fill="#173b46">organizer</text>
    <text x="965" y="253" text-anchor="middle" font-size="16" fill="#53616b">турниры, задачи, импорт</text>
    <text x="235" y="458" text-anchor="middle" font-size="24" font-weight="800" fill="#173b46">moderator</text>
    <text x="235" y="488" text-anchor="middle" font-size="16" fill="#53616b">заявки и контроль качества</text>
    <text x="965" y="458" text-anchor="middle" font-size="24" font-weight="800" fill="#173b46">admin</text>
    <text x="965" y="488" text-anchor="middle" font-size="16" fill="#53616b">пользователи, аудит, аналитика</text>
    <text x="600" y="563" text-anchor="middle" font-size="24" font-weight="800" fill="#173b46">owner</text>
    <text x="600" y="593" text-anchor="middle" font-size="16" fill="#53616b">системные настройки и критические действия</text>
  </g>
  <g stroke="#4fb286" stroke-width="4" fill="none" opacity="0.65">
    <path d="M365 231 C450 248 492 280 518 307"/>
    <path d="M835 231 C750 248 708 280 682 307"/>
    <path d="M365 466 C450 446 492 415 518 388"/>
    <path d="M835 466 C750 446 708 415 682 388"/>
