<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L8,5 L1,9 Z" fill="#f43f5e"/>
    </marker>
  </defs>

  <rect width="1200" height="560" fill="#0b1220"/>
  <rect x="395" y="40" width="410" height="480" rx="24" fill="#131b2e" stroke="#1e293b" stroke-width="0.5"/>

  <g filter="url(#soft-shadow)">
    <rect x="70" y="95" width="300" height="80" rx="15" fill="#131b2e" stroke="#1e293b"/>
    <rect x="70" y="240" width="300" height="80" rx="15" fill="#131b2e" stroke="#1e293b"/>
    <rect x="70" y="385" width="300" height="80" rx="15" fill="#131b2e" stroke="#1e293b"/>
    <rect x="830" y="95" width="300" height="80" rx="15" fill="#131b2e" stroke="#1e293b"/>
    <rect x="830" y="240" width="300" height="80" rx="15" fill="#131b2e" stroke="#1e293b"/>
    <rect x="830" y="385" width="300" height="80" rx="15" fill="#131b2e" stroke="#1e293b"/>
  </g>

  <g stroke="#f43f5e" stroke-width="3.5" fill="none" marker-end="url(#arrow)" opacity="0.7">
    <path d="M510 215 C455 190 420 155 382 138"/>
    <path d="M500 280 C452 280 420 280 382 280"/>
    <path d="M510 345 C455 370 420 405 382 422"/>
    <path d="M690 215 C745 190 780 155 818 138"/>
    <path d="M700 280 C748 280 780 280 818 280"/>
    <path d="M690 345 C745 370 780 405 818 422"/>
  </g>

  <circle cx="600" cy="280" r="125" fill="#131b2e" stroke="#f43f5e" stroke-width="2" filter="url(#soft-shadow)"/>
  <text x="600" y="295" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="800" fill="#f8fafc">Турнир</text>
  <text x="600" y="442" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#f59e0b">центр платформы</text>
  <text x="600" y="480" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#94a3b8">вокруг него собираются все действия</text>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle" font-size="25" font-weight="800" fill="#e2e8f0">
    <text x="220" y="145">участники</text>
    <text x="220" y="290">задачи</text>
    <text x="220" y="435">ответы</text>
    <text x="980" y="145">проверка</text>
    <text x="980" y="290">рейтинг</text>
