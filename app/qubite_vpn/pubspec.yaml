name: qubite_vpn
description: Qubite VPN — мультиплатформенный VPN-клиент на базе sing-box
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  dio: ^5.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # UI
  google_fonts: ^6.1.0

  # Platform
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
