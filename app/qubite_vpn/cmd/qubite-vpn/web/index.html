<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qubite VPN</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <!-- ===== Login Screen ===== -->
    <div id="loginScreen" class="screen">
        <div class="login-container">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#6c5ce7"/>
                    <path d="M14 34V14h6l8 12V14h6v20h-6l-8-12v12h-6z" fill="#fff"/>
                </svg>
                <h1>Qubite VPN</h1>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="field">
                    <label for="loginInput">Логин или email</label>
                    <input type="text" id="loginInput" name="login" autocomplete="username" required>
                </div>
                <div class="field">
                    <label for="passwordInput">Пароль</label>
                    <div class="password-wrap">
                        <input type="password" id="passwordInput" name="password" autocomplete="current-password" required>
                        <button type="button" id="togglePassword" class="pw-toggle" tabindex="-1" aria-label="Показать пароль">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="loginError" class="form-error" hidden></div>

                <button type="submit" id="loginBtn" class="btn-primary">
                    <span id="loginBtnText">Войти</span>
                    <span id="loginSpinner" class="spinner" hidden></span>
                </button>
            </form>

            <div class="auth-switch">
                Нет аккаунта? <a href="#" id="goToRegister">Создать</a>
            </div>

            <div class="login-footer">
                <span class="login-version">v0.1.0</span>
            </div>
        </div>
    </div>

    <!-- ===== Register Screen ===== -->
    <div id="registerScreen" class="screen" hidden>
        <div class="login-container">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#6c5ce7"/>
                    <path d="M14 34V14h6l8 12V14h6v20h-6l-8-12v12h-6z" fill="#fff"/>
                </svg>
                <h1>Регистрация</h1>
            </div>

            <form id="registerForm" autocomplete="off">
                <div class="field">
                    <label for="regLogin">Логин</label>
                    <input type="text" id="regLogin" name="login" autocomplete="username" placeholder="latin, 2-32 символа" required>
                </div>
                <div class="field">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" name="email" autocomplete="email" required>
                </div>
                <div class="field">
                    <label for="regPassword">Пароль</label>
                    <div class="password-wrap">
                        <input type="password" id="regPassword" name="password" autocomplete="new-password" placeholder="8+ символов, буквы + цифры" required>
                        <button type="button" id="toggleRegPassword" class="pw-toggle" tabindex="-1" aria-label="Показать пароль">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="registerError" class="form-error" hidden></div>

                <button type="submit" id="registerBtn" class="btn-primary">
                    <span id="registerBtnText">Создать аккаунт</span>
                    <span id="registerSpinner" class="spinner" hidden></span>
                </button>
            </form>

            <div class="auth-switch">
                Уже есть аккаунт? <a href="#" id="goToLogin">Войти</a>
            </div>
        </div>
    </div>

    <!-- ===== Email Verification Screen ===== -->
    <div id="verifyScreen" class="screen" hidden>
        <div class="login-container">
            <div class="login-logo">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#6c5ce7"/>
                    <path d="M12 20l12 8 12-8M8 16v16h32V16H8z" stroke="#fff" stroke-width="2.5" fill="none"/>
                </svg>
                <h1>Подтверди email</h1>
            </div>

            <p id="verifyHint" class="verify-hint">Мы отправили код на твой email. Введи его ниже.</p>

            <form id="verifyForm" autocomplete="off">
                <div class="field">
                    <label for="verifyCode">Код подтверждения</label>
                    <input type="text" id="verifyCode" name="code" autocomplete="one-time-code" inputmode="numeric" maxlength="8" placeholder="Код из письма" required>
                </div>

                <div id="verifyError" class="form-error" hidden></div>

                <button type="submit" id="verifyBtn" class="btn-primary">
                    <span id="verifyBtnText">Подтвердить</span>
                    <span id="verifySpinner" class="spinner" hidden></span>
                </button>
            </form>

            <div class="auth-switch">
                <a href="#" id="resendCode">Отправить код повторно</a>
            </div>
        </div>
    </div>

    <!-- ===== VPN Screen ===== -->
    <div id="vpnScreen" class="screen" hidden>
        <header>
            <div class="header-left">
                <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#6c5ce7"/>
                    <path d="M14 34V14h6l8 12V14h6v20h-6l-8-12v12h-6z" fill="#fff"/>
                </svg>
                <span class="app-name">Qubite VPN</span>
            </div>
            <div class="header-right">
                <span id="userBadge" class="user-badge"></span>
                <button id="logoutBtn" class="btn-icon" title="Выйти">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </div>
        </header>

        <section class="connect-section">
            <div id="statusRing" class="status-ring">
                <button id="connectBtn" class="connect-btn" aria-label="Connect">
                    <svg id="playIcon" class="btn-svg" width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="6,3 20,12 6,21"/>
                    </svg>
                    <svg id="stopIcon" class="btn-svg" width="48" height="48" viewBox="0 0 24 24" fill="currentColor" hidden>
                        <rect x="5" y="5" width="14" height="14" rx="2"/>
                    </svg>
                </button>
            </div>
            <div id="statusText" class="status-text">Отключен</div>
            <div id="statusSub" class="status-sub"></div>
        </section>

        <section id="serverSection" class="server-section">
            <div id="serverCard" class="server-card" role="button" tabindex="0">
                <div class="server-card-info">
                    <div id="serverName" class="server-name">Автовыбор</div>
                    <div id="serverRegion" class="server-region">Лучший сервер</div>
                </div>
                <svg class="arrow-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </div>
        </section>

        <section id="statsSection" class="stats-section" hidden>
            <div class="stat">
                <span class="stat-label">Время</span>
                <span id="uptimeValue" class="stat-value">00:00:00</span>
            </div>
            <div class="stat">
                <span class="stat-label">Сервер</span>
                <span id="serverValue" class="stat-value">-</span>
            </div>
        </section>

        <section id="errorSection" class="error-section" hidden>
            <div id="errorText" class="error-text"></div>
        </section>

        <!-- Server list modal -->
        <div id="serverModal" class="modal" hidden>
            <div class="modal-overlay" id="modalOverlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Серверы</h3>
                    <button id="closeModal" class="btn-icon">&times;</button>
                </div>
                <div id="serverList" class="server-list"></div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
