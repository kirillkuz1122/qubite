# SNI-based TCP router for port 443.
# Routes TLS connections without decrypting them:
#   - Qubite domains -> Caddy (NaiveProxy + website)
#   - Everything else -> sing-box Reality (VLESS)
#
# Requires: nginx with ngx_stream_ssl_preread_module (standard in most builds).
# Include this file from the main nginx.conf OUTSIDE the http {} block:
#   include /etc/nginx/stream.d/*.conf;

stream {
    log_format stream_basic '$remote_addr [$time_local] '
                            '$protocol $status $bytes_sent $bytes_received '
                            '$session_time "$ssl_preread_server_name" -> $upstream_addr';
    access_log /var/log/nginx/stream-access.log stream_basic;

    map $ssl_preread_server_name $backend {
        ~\.qubiteapp\.online$     caddy_backend;
        ~\.qubiteapp\.ru$         caddy_backend;
        qubiteapp.online          caddy_backend;
        qubiteapp.ru              caddy_backend;
        ""                        caddy_backend;
        default                   reality_backend;
    }

    upstream caddy_backend {
        server 127.0.0.1:18443;
    }

    upstream reality_backend {
        server 127.0.0.1:18444;
    }

    server {
        listen 443;
        listen [::]:443;
        ssl_preread on;
        proxy_pass $backend;
        proxy_protocol off;
        proxy_connect_timeout 5s;
        proxy_timeout 300s;
    }
}
