upstream qubite_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=api_general:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

server {
    listen 127.0.0.1:8080;
    listen [::1]:8080 ipv6only=on;
    server_name qubiteapp.ru www.qubiteapp.ru ru.qubiteapp.online www.ru.qubiteapp.online;

    client_max_body_size 2m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 15s;
    reset_timedout_connection on;

    large_client_header_buffers 4 8k;
    limit_conn per_ip_conn 40;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Robots-Tag "noarchive" always;

    location /api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://qubite_backend;
        include /etc/nginx/snippets/qubite-proxy-headers.conf;
    }

    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://qubite_backend;
        include /etc/nginx/snippets/qubite-proxy-headers.conf;
    }

    location / {
        proxy_pass http://qubite_backend;
        include /etc/nginx/snippets/qubite-proxy-headers.conf;
    }
}
