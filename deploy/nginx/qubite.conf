upstream qubite_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=api_general:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=30r/m;
limit_conn_zone $binary_remote_addr zone=per_ip_conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name qubiteapp.ru www.qubiteapp.ru;
    return 301 https://qubiteapp.ru$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name qubiteapp.online www.qubiteapp.online;
    return 301 https://qubiteapp.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.qubiteapp.ru;

    ssl_certificate /etc/letsencrypt/live/qubiteapp.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qubiteapp.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://qubiteapp.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qubiteapp.online www.qubiteapp.online;

    # Keep this block only if your current Certbot certificate also covers
    # qubiteapp.online/www.qubiteapp.online. If not, issue a SAN cert first.
    ssl_certificate /etc/letsencrypt/live/qubiteapp.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qubiteapp.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://qubiteapp.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qubiteapp.ru;

    ssl_certificate /etc/letsencrypt/live/qubiteapp.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qubiteapp.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        image/svg+xml;

    client_max_body_size 2m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 15s;
    reset_timedout_connection on;

    large_client_header_buffers 4 8k;
    limit_conn per_ip_conn 40;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Robots-Tag "noarchive" always;

    location /api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://qubite_backend;
        include /etc/nginx/snippets/qubite-proxy-headers.conf;
    }

    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://qubite_backend;
        include /etc/nginx/snippets/qubite-proxy-headers.conf;
    }

    location / {
        proxy_pass http://qubite_backend;
        include /etc/nginx/snippets/qubite-proxy-headers.conf;
    }
}
